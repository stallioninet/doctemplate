# Render Blueprint — provisions web service + Postgres + persistent disk
# in one go. Commit this file, then on Render: New → Blueprint → connect
# repo. Render reads this file and creates everything.
#
# Free tier caveats:
#  - Postgres free plan auto-expires after 30 days; upgrade to Starter
#    ($7/mo) before then for production.
#  - Free web service sleeps after 15 min idle. While sleeping, the
#    generationWorker + webhookWorker DO NOT TICK — `POST /generate` or
#    `/send` jobs sit in the queue until the next HTTP request wakes the
#    service (cold start ~30-60s). Acceptable for casual testing, NOT for
#    production. Upgrade `plan` to `starter` when you need always-on.
#  - Free disks are not available; persistent disk requires a paid plan.
#    The disk block below is commented out — uploaded templates / generated
#    PDFs / signed artifacts will be lost on each cold start. Once you
#    upgrade to Starter, uncomment the disk block.

services:
  - type: web
    name: doctemplate-backend
    runtime: docker
    dockerfilePath: ./apps/backend/Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doctemplate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: WEBHOOK_SIGNING_SECRET
        generateValue: true
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_ROOT
        value: /storage
      - key: NODE_ENV
        value: production
      # Fill these in the Render dashboard after first deploy:
      #   PUBLIC_BASE_URL  → your Render service URL (https://…onrender.com)
      #   CORS_ORIGINS     → your Vercel app URL (comma-separated for multiple)
      - key: PUBLIC_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
    # disk:                 # Uncomment after upgrading `plan` to `starter`
    #   name: doctemplate-storage
    #   mountPath: /storage
    #   sizeGB: 10

databases:
  - name: doctemplate-db
    plan: free
    region: oregon
    postgresMajorVersion: 16
